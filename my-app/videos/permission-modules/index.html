<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permission Modules Explainer</title>
    <style>
      :root {
        --bg: #101416;
        --surface: #172025;
        --surface-2: #202b31;
        --fg: #f2f5ef;
        --muted: #aeb8b4;
        --safe: #78d08b;
        --review: #e3b65f;
        --risk: #ed786a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "PingFang SC", "STHeiti", "Inter", system-ui, sans-serif;
      }

      [data-composition-id="permission-modules"] {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        position: relative;
        background:
          linear-gradient(90deg, rgba(242, 245, 239, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(242, 245, 239, 0.03) 1px, transparent 1px),
          radial-gradient(circle at 22% 18%, rgba(120, 208, 139, 0.16), transparent 34%),
          radial-gradient(circle at 76% 76%, rgba(237, 120, 106, 0.12), transparent 38%),
          var(--bg);
        background-size: 80px 80px, 80px 80px, auto, auto, auto;
      }

      .scene-content {
        width: 100%;
        height: 100%;
        padding: 84px 96px 80px;
        display: flex;
        flex-direction: column;
        gap: 56px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .kicker {
        color: var(--muted);
        font-size: 28px;
        font-weight: 500;
      }

      .title {
        margin: 12px 0 0;
        font-size: 64px;
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: 0;
      }

      .status {
        padding: 14px 22px;
        border: 1px solid rgba(242, 245, 239, 0.14);
        border-radius: 999px;
        color: var(--muted);
        font-size: 24px;
      }

      .modules {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 28px;
        align-items: stretch;
      }

      .module {
        min-width: 0;
        border: 1px solid rgba(242, 245, 239, 0.12);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(32, 43, 49, 0.96), rgba(23, 32, 37, 0.96));
        padding: 38px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        transform-origin: center;
      }

      .module.safe {
        border-color: rgba(120, 208, 139, 0.38);
      }

      .module.review {
        border-color: rgba(227, 182, 95, 0.42);
      }

      .module.risk {
        border-color: rgba(237, 120, 106, 0.42);
      }

      .module-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .module h2 {
        margin: 0;
        font-size: 48px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .badge {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 900;
      }

      .safe .badge {
        color: var(--safe);
        background: rgba(120, 208, 139, 0.11);
      }

      .review .badge {
        color: var(--review);
        background: rgba(227, 182, 95, 0.12);
      }

      .risk .badge {
        color: var(--risk);
        background: rgba(237, 120, 106, 0.12);
      }

      .points {
        display: grid;
        gap: 18px;
        margin: 42px 0;
      }

      .point {
        min-height: 66px;
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--fg);
        font-size: 30px;
        line-height: 1.2;
      }

      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .safe .dot {
        background: var(--safe);
      }

      .review .dot {
        background: var(--review);
      }

      .risk .dot {
        background: var(--risk);
      }

      .recommend {
        min-height: 76px;
        border-top: 1px solid rgba(242, 245, 239, 0.1);
        padding-top: 24px;
        color: var(--muted);
        font-size: 26px;
      }

      .safe .recommend strong {
        color: var(--safe);
      }

      .review .recommend strong {
        color: var(--review);
      }

      .risk .recommend strong {
        color: var(--risk);
      }

      .cursor {
        position: absolute;
        width: 38px;
        height: 38px;
        left: 332px;
        top: 812px;
        border-left: 28px solid var(--fg);
        border-top: 18px solid transparent;
        border-bottom: 18px solid transparent;
        filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.45));
      }

      .warn-ring {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 2px solid rgba(237, 120, 106, 0.45);
        right: 248px;
        bottom: 130px;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="permission-modules"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="15"
      data-track-index="0"
    >
      <div class="scene-content">
        <div class="topbar">
          <div>
            <div class="kicker">权限模式</div>
            <h1 class="title">从保守到放开，三种选择</h1>
          </div>
          <div class="status">项目访问设置</div>
        </div>

        <div class="modules">
          <section class="module safe">
            <div>
              <div class="module-head">
                <h2>默认权限</h2>
                <div class="badge">1</div>
              </div>
              <div class="points">
                <div class="point"><span class="dot"></span><span>读取项目文件</span></div>
                <div class="point"><span class="dot"></span><span>修改前确认</span></div>
                <div class="point"><span class="dot"></span><span>不能联网</span></div>
              </div>
            </div>
            <div class="recommend"><strong>最安全</strong>，也最保守</div>
          </section>

          <section class="module review">
            <div>
              <div class="module-head">
                <h2>自动审查</h2>
                <div class="badge">2</div>
              </div>
              <div class="points">
                <div class="point"><span class="dot"></span><span>项目内读写</span></div>
                <div class="point"><span class="dot"></span><span>高风险弹窗</span></div>
                <div class="point"><span class="dot"></span><span>删除需确认</span></div>
              </div>
            </div>
            <div class="recommend"><strong>推荐</strong>日常使用</div>
          </section>

          <section class="module risk">
            <div>
              <div class="module-head">
                <h2>完全访问</h2>
                <div class="badge">3</div>
              </div>
              <div class="points">
                <div class="point"><span class="dot"></span><span>代表你操作</span></div>
                <div class="point"><span class="dot"></span><span>边界最少</span></div>
                <div class="point"><span class="dot"></span><span>设置会提醒</span></div>
              </div>
            </div>
            <div class="recommend"><strong>不太建议</strong>开启会有提示</div>
          </section>
        </div>
      </div>
      <div class="cursor"></div>
      <div class="warn-ring"></div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".title", { y: 30, opacity: 0, duration: 0.45, ease: "power3.out" }, 0);
        tl.from(".status", { y: -18, opacity: 0, duration: 0.35, ease: "power2.out" }, 0.1);
        tl.from(".module", { y: 80, opacity: 0, scale: 0.96, duration: 0.55, stagger: 0.16, ease: "power3.out" }, 0.35);
        tl.from(".point", { x: -18, opacity: 0, duration: 0.28, stagger: 0.055, ease: "power2.out" }, 1.0);
        tl.from(".cursor", { opacity: 0, scale: 0.7, duration: 0.25, ease: "power2.out" }, 3.8);
        tl.to(".cursor", { x: 584, y: -6, duration: 1.4, ease: "power2.inOut" }, 5.9);
        tl.to(".cursor", { x: 1134, y: 4, duration: 1.35, ease: "power2.inOut" }, 10.7);
        tl.from(".warn-ring", { opacity: 0, scale: 0.55, duration: 0.35, ease: "power2.out" }, 12.1);
        tl.to(".warn-ring", { scale: 1.18, opacity: 0.12, duration: 0.8, repeat: 2, yoyo: true, ease: "sine.inOut" }, 12.45);
        window.__timelines["permission-modules"] = tl;
      </script>
    </div>
  </body>
</html>
